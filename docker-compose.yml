services:
  python-base:
    build:
      context: .
      dockerfile: python-base/Dockerfile
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  python-improved:
    build:
      context: .
      dockerfile: python-improved/Dockerfile
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  python-indexed:
    build:
      context: .
      dockerfile: python-indexed/Dockerfile
    ports:
      - "8005:8005"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  java:
    build:
      context: .
      dockerfile: java/Dockerfile
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  go:
    build:
      context: .
      dockerfile: go/Dockerfile
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  # cpp:
  #   build:
  #     context: .
  #     dockerfile: cpp/Dockerfile
  #   ports:
  #     - "8004:8004"

  nest:
    build:
      context: .
      dockerfile: nest/Dockerfile
    ports:
      - "8006:8006"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

