services:
  python-base:
    build:
      context: .
      dockerfile: python-base/Dockerfile
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  python-improved:
    build:
      context: .
      dockerfile: python-improved/Dockerfile
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  python-indexed:
    build:
      context: .
      dockerfile: python-indexed/Dockerfile
    ports:
      - "8005:8005"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

